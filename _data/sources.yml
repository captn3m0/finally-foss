# Finally-FOSS: Projects with delayed open-source clauses (BSL, FSL, FCL)
#
# Each entry tracks a project using a source-available license that converts
# to an OSS license after a delay period. The `ranges` list captures multiple
# licensing windows — a project may have changed delay periods, license
# versions, or even reverted to proprietary for later releases.
#
# Fields:
#   name:             org/repo or project identifier
#   repo:             primary source code URL
#   stars:            approximate star count (at time of data collection)
#   ranges[]:
#     versions:       Gem::Requirement-compatible version constraint (e.g. ">= 2.1, < 24.3")
#     original_license: SPDX identifier of the source-available license
#     oss_license:    the OSS license it converts to
#     delay_yrs:      years until conversion to OSS
#     notes:          (optional) additional context
#
# Data sources:
#   - FSL/FCL: github.com/fairsource/fss.cool (repos with 50+ stars)
#   - BSL: manual research from project announcements and LICENSE files

# =============================================================================
# Business Source License (BUSL-1.1) projects
# =============================================================================

# --- MariaDB MaxScale ---
# Original BSL creator. MaxScale 25.01+ went proprietary.
- name: "mariadb-corporation/MaxScale"
  repo: https://github.com/mariadb-corporation/MaxScale
  stars: 1400
  ranges:
    - versions: ">= 2.0.0, <= 2.0.4"
      original_license: BSL-1.0
      oss_license: GPL-2.0-or-later
      delay_yrs: 3
      notes: "Original BSL 1.0. All now GPL."
    - versions: ">= 2.1, <= 2.4.2"
      original_license: BUSL-1.1
      oss_license: GPL-2.0-or-later
      delay_yrs: 2
      notes: "2-year delay. All now GPL."
    - versions: ">= 2.4.3, < 25.1"
      original_license: BUSL-1.1
      oss_license: GPL-2.0-or-later
      delay_yrs: 3
      notes: "3-year delay. Versions through 21.06 are now GPL. v25.01+ switched to proprietary."

