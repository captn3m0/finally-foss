# --- CockroachDB ---
# BSL from v19.2 (2019) through v24.2. v24.3+ switched to proprietary CSL (Nov 2024).
- name: "cockroachdb/cockroach"
  repo: https://github.com/cockroachdb/cockroach
  stars: 30300
  ranges:
    - versions: ">= 19.2, < 24.3"
      original_license: BUSL-1.1
      oss_license: Apache-2.0
      delay_yrs: 3
      notes: >
        Each release converts to Apache-2.0 after 3 years. Versions through
        v21.x are already Apache-2.0. v24.3+ uses proprietary CockroachDB
        Software License (CSL), no longer has delayed OSS conversion.

